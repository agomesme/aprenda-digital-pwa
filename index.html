<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aprenda Digital - App educacional para idosos aprenderem a usar serviços digitais com segurança." />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Aprenda Digital" />
    
    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ✅ Ícone -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231e3a8a' width='100' height='100'/><text x='50%' y='50%' font-size='60' fill='white' text-anchor='middle' dy='.3em'>📱</text></svg>" />
    
    <title>Aprenda Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #f1f5f9;
        }

        #root {
            min-height: 100vh;
        }

        /* Loading spinner */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Instalação PWA */
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
        }

        .install-prompt.hidden {
            display: none;
        }

        .install-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .install-icon {
            font-size: 40px;
        }

        .install-text h3 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #1e3a8a;
        }

        .install-text p {
            font-size: 14px;
            color: #64748b;
        }

        .install-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .btn-install {
            padding: 8px 16px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-install:hover {
            background: #1e40af;
        }

        .btn-install.secondary {
            background: #e2e8f0;
            color: #1e3a8a;
        }

        .btn-install.secondary:hover {
            background: #cbd5e1;
        }

        /* Indicador offline -->
        .offline-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ef4444;
            color: white;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 999;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .offline-indicator.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div class="spinner"></div>
            <div>Carregando Aprenda Digital...</div>
        </div>
    </div>

    <!-- ✅ Indicador Offline -->
    <div class="offline-indicator" id="offlineIndicator">
        📡 Você está OFFLINE - O app funcionará normalmente com dados em cache
    </div>

    <!-- ✅ Prompt de Instalação PWA -->
    <div class="install-prompt hidden" id="installPrompt">
        <div class="install-content">
            <div class="install-icon">📱</div>
            <div class="install-text">
                <h3>Instalar Aprenda Digital?</h3>
                <p>Acesse o app como um programa normal do seu telefone/computador</p>
            </div>
            <div class="install-buttons">
                <button class="btn-install secondary" id="dismissInstall">Agora não</button>
                <button class="btn-install" id="installButton">Instalar</button>
            </div>
        </div>
    </div>

    <!-- ✅ React App -->
    <script async src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script async src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script async src="https://cdn.tailwindcss.com"></script>
    <script async src="https://unpkg.com/lucide@latest"></script>

    <!-- ✅ App Component (será injetado aqui) -->
    <script type="module">
        // Registra Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(
                    (registration) => {
                        console.log('✅ Service Worker registrado:', registration);
                    },
                    (err) => {
                        console.log('⚠️ Service Worker falhou:', err);
                    }
                );
            });
        }

        // Detecta se está offline
        window.addEventListener('online', () => {
            document.getElementById('offlineIndicator').classList.remove('show');
        });

        window.addEventListener('offline', () => {
            document.getElementById('offlineIndicator').classList.add('show');
        });

        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');
        const dismissInstall = document.getElementById('dismissInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.remove('hidden');
            console.log('📦 Prompt de instalação disponível');
        });

        installButton?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Usuário respondeu: ${outcome}`);
                deferredPrompt = null;
                installPrompt.classList.add('hidden');
            }
        });

        dismissInstall?.addEventListener('click', () => {
            installPrompt.classList.add('hidden');
        });

        window.addEventListener('appinstalled', () => {
            console.log('✅ App instalado com sucesso!');
            installPrompt.classList.add('hidden');
        });
    </script>

    <!-- ✅ Importar App React (será vindo do build) -->
    <script type="module" src="/App.jsx"></script>
</body>
</html>
